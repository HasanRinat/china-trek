<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>China Trek — Путешествие по Китаю</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            flex-direction: column;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .features {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        
        .feature {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #667eea;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 { font-size: 1.8em; }
            .btn { padding: 12px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇨🇳 China Trek</h1>
        <p class="subtitle">Путешествие по Китаю с изучением языка</p>
        
        <div class="buttons">
            <a href="/register" class="btn btn-primary">🚀 Начать путешествие</a>
            <a href="/login" class="btn btn-secondary">🔑 Уже есть аккаунт</a>
        </div>
        
        <div class="features">
            <span class="feature">🗣️ Учи китайский</span>
            <span class="feature">🏯 Исследуй Пекин</span>
            <span class="feature">🐼 Встречай панд</span>
            <span class="feature">🎁 Получай бонусы</span>
        </div>
    </div>
</body>
</html>
