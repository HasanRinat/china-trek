<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз — China Trek</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .balance-info {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 20px;
        }
        .question-text {
            font-size: 1.4em;
            text-align: center;
            margin: 30px 0;
            line-height: 1.4;
            color: #333;
        }
        .options { display: grid; gap: 15px; }
        .option {
            background: #f8f9fa;
            padding: 18px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            font-size: 1.1em;
        }
        .option:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f0ff, #fff);
        }
        .submit-btn {
            width: 100%;
            margin-top: 30px;
            padding: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover { transform: translateY(-2px); }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .result.success { background: #d4edda; color: #155724; display: block; }
        .result.failure { background: #f8d7da; color: #721c24; display: block; }
        .result.info { background: #cce5ff; color: #004085; display: block; }
        .attempt-info { text-align: center; color: #666; margin-top: 15px; }
        @media (max-width: 480px) {
            .container { padding: 20px; }
            .question-text { font-size: 1.2em; }
            .option { padding: 14px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="balance-info">
            💰 Твой баланс: <span id="currentBalance">0</span> баллов
        </div>
        
        <div class="question-text">
            <div style="font-size: 4em; margin-bottom: 10px;">🇨🇳</div>
            Как сказать "Привет" по-китайски?
        </div>
        
        <div class="options">
            <div class="option" data-answer="nihaoma">А) Нихао ма?</div>
            <div class="option" data-answer="nihaoyou">Б) Нихао ю?</div>
            <div class="option" data-answer="nihao">В) Нихао</div>
            <div class="option" data-answer="zaijian">Г) Зайцзянь</div>
        </div>
        
        <button class="submit-btn" onclick="submitAnswer()">✅ Ответить</button>
        <div id="result" class="result"></div>
        <div id="attemptInfo" class="attempt-info">Попытка 1 из 2</div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const locationIndex = urlParams.get('locationIndex');
        
        let attempt = 1;
        let selectedAnswer = null;
        let currentBalance = 0;
        
        // Загружаем баланс
        async function loadBalance() {
            if (!email) {
                window.location.href = '/';
                return;
            }
            
            try {
                const response = await fetch(`/api/login?email=${encodeURIComponent(email)}`, {
                    method: 'POST'
                });
                if (response.ok) {
                    const user = await response.json();
                    currentBalance = user.balance || 100;
                    document.getElementById('currentBalance').textContent = currentBalance;
                } else {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Ошибка загрузки баланса:', error);
            }
        }
        
        // Выбор ответа
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedAnswer = this.getAttribute('data-answer');
            });
        });
        
        async function submitAnswer() {
            if (!selectedAnswer) {
                alert('Выберите ответ!');
                return;
            }
            
            const correctAnswer = 'nihao';
            const resultDiv = document.getElementById('result');
            const attemptInfo = document.getElementById('attemptInfo');
            
            // БЛОК ДЛЯ ПРАВИЛЬНОГО ОТВЕТА
            if (selectedAnswer === correctAnswer) {
                console.log("Правильный ответ! Попытка:", attempt);
                
                // 1. Начисляем баллы за ответ
                const answerResponse = await fetch(`/api/answer?email=${encodeURIComponent(email)}&attempt=${attempt}`, {
                    method: 'POST'
                });
                
                if (!answerResponse.ok) {
                    console.error("Ошибка при начислении баллов");
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = '❌ Ошибка сервера. Попробуйте позже.';
                    return;
                }
                
                const user = await answerResponse.json();
                let points = attempt === 1 ? 10 : 5;
                
                console.log("Начислено баллов:", points);
                console.log("Новый баланс:", user.balance);
                
                // 2. Автоматически завершаем квиз и переходим на следующую локацию
                const completeResponse = await fetch(`/api/completeQuiz?email=${encodeURIComponent(email)}`, {
                    method: 'POST'
                });
                
                if (completeResponse.ok) {
                    const updatedUser = await completeResponse.json();
                    console.log("Переход на локацию:", updatedUser.currentLocationIndex);
                    
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `✅ Правильно! +${points} баллов! Переход на следующую локацию...`;
                    
                    // Отключаем кнопку, чтобы не нажали дважды
                    document.querySelector('.submit-btn').disabled = true;
                    
                    setTimeout(() => {
                        window.location.href = `/map?email=${encodeURIComponent(email)}`;
                    }, 1500);
                } else {
                    console.error("Ошибка при завершении квиза");
                    resultDiv.className = 'result failure';
                    resultDiv.innerHTML = '❌ Ошибка перехода. Попробуйте ещё раз.';
                }
            } 
            // БЛОК ДЛЯ НЕПРАВИЛЬНОГО ОТВЕТА
            else {
                console.log("Неправильный ответ. Попытка:", attempt);
                
                if (attempt >= 2) {
                    // Вторая попытка неправильная — завершаем с 0 баллов
                    resultDiv.className = 'result failure';
                    resultDiv.innerHTML = '❌ Неправильно! Правильный ответ: "Нихао". 0 баллов. Переход на карту...';
                    
                    // Всё равно завершаем квиз (без начисления баллов)
                    await fetch(`/api/completeQuiz?email=${encodeURIComponent(email)}`, {
                        method: 'POST'
                    });
                    
                    setTimeout(() => {
                        window.location.href = `/map?email=${encodeURIComponent(email)}`;
                    }, 2000);
                } else {
                    // Первая попытка неправильная — даём вторую попытку
                    attempt++;
                    attemptInfo.textContent = `Попытка ${attempt} из 2`;
                    resultDiv.className = 'result failure';
                    resultDiv.innerHTML = '❌ Неправильно! Попробуй ещё раз.';
                    
                    // Очищаем выбранный ответ для следующей попытки
                    selectedAnswer = null;
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    
                    setTimeout(() => {
                        resultDiv.style.display = 'none';
                        setTimeout(() => { resultDiv.style.display = ''; }, 100);
                    }, 1500);
                }
            }
        }
        
        // Загружаем баланс при старте
        loadBalance();
    </script>
</body>
</html>
